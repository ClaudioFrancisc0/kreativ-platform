[phases.setup]
nixPkgs = [
    "nodejs", 
    "python311", 
    "python311Packages.pandas", 
    "python311Packages.numpy", 
    "python311Packages.flask", 
    "python311Packages.flask-cors",
    "python311Packages.python-dotenv",
    "python311Packages.requests",
    "ffmpeg", 
    "imagemagick", 
    "libglvnd",
    "glib",
    "zlib",
    "curl",
    "gcc",
    "gnumake",
    "pkg-config",
    "openssl",
    "libffi"
]

[phases.build]
cmds = [
    "python3 -m venv --system-site-packages apps/youtube-shorts/venv && . apps/youtube-shorts/venv/bin/activate && pip install --no-cache-dir -r apps/youtube-shorts/requirements.txt",
    "python3 -m venv --system-site-packages apps/trade-facil/venv && . apps/trade-facil/venv/bin/activate && pip install --no-cache-dir -r apps/trade-facil/requirements.txt"
]

[start]
cmd = "npm start"
