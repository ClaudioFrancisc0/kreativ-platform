<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Inicial - StudioMe</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="/images/logo.png" alt="StudioMe" class="logo">
                <h1>Bem-vindo à StudioMe</h1>
                <p>Configure sua conta de administrador</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="setupForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required
                        autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required
                        minlength="6" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar Senha</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirme sua senha"
                        required minlength="6" autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Criar Administrador
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('setupForm');
        const submitBtn = document.getElementById('submitBtn');
        const alertDiv = document.getElementById('alert');

        function showAlert(message, type = 'error') {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type} show`;
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validações client-side
            if (password !== confirmPassword) {
                showAlert('As senhas não coincidem', 'error');
                return;
            }

            if (password.length < 6) {
                showAlert('A senha deve ter no mínimo 6 caracteres', 'error');
                return;
            }

            // Loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            submitBtn.textContent = 'Criando...';

            try {
                const response = await fetch('/api/auth/setup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Administrador criado com sucesso! Redirecionando...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1500);
                } else {
                    showAlert(data.error || 'Erro ao criar administrador', 'error');
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('loading');
                    submitBtn.textContent = 'Criar Administrador';
                }
            } catch (error) {
                console.error('Erro:', error);
                showAlert('Erro ao conectar com o servidor', 'error');
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                submitBtn.textContent = 'Criar Administrador';
            }
        });

        // Verificar se setup já foi feito
        async function checkSetup() {
            try {
                const response = await fetch('/api/auth/check-setup');
                const data = await response.json();

                if (!data.needsSetup) {
                    // Setup já foi feito, redirecionar para login
                    window.location.href = '/login.html';
                }
            } catch (error) {
                console.error('Erro ao verificar setup:', error);
            }
        }

        checkSetup();
    </script>
</body>

</html>
