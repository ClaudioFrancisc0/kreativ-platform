<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Kreativ</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .settings-page {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .config-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
        }

        .config-card h2 {
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--brand-color);
        }

        .btn-save {
            background: var(--brand-color);
            color: var(--brand-text);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        .status-msg {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .status-success {
            background: #e6f7e6;
            color: #22a722;
        }

        .status-error {
            background: #ffe6e6;
            color: #d32f2f;
        }

        .dashboard-header {
            background: var(--card-bg);
            padding: 20px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .back-btn:hover {
            color: var(--brand-color);
        }

        .helper-text {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .helper-link {
            color: var(--brand-color);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div id="loadingScreen" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        Carregando...</div>

    <div id="settingsPage" style="display: none; background: transparent; min-height: 100vh;">
        <header class="page-header-unified">
            <div class="header-left">
                <div class="header-title">
                    <img src="/images/logo-wordmark.png" alt="Kreativ" class="header-logo">
                    <span class="header-separator"></span>
                    <a href="/dashboard.html" class="back-btn" style="margin-right: 8px;">← Voltar</a>
                    <h1 style="font-size: 20px;">⚙️ Configurações</h1>
                </div>
            </div>
            <div class="user-menu">
                <span class="user-email" id="userEmail"></span>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </header>

        <main class="settings-page">

            <!-- RB Podcast Config -->
            <div class="config-card">
                <h2>🎙️ RB Podcast (OpenAI)</h2>
                <p class="helper-text" style="margin-bottom: 20px;">
                    Configuração do motor gerador de teleprompter e áudio. Insira sua chave API do OpenAI (começada em sk-...).
                </p>
                <div class="form-status" id="openaiStatusMsg" style="margin-bottom:15px; padding:10px; border-radius:5px; display:none;"></div>
                <div class="form-group">
                    <label>API Key da OpenAI</label>
                    <input type="password" id="rbApiKey" class="form-control" placeholder="Carregando..." autocomplete="off">
                </div>
                <button class="btn-save" id="btnSaveOpenAI" onclick="saveOpenAIKey()">💾 Salvar Chave OpenAI</button>
            </div>

        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        checkAuth(true).then(isAuth => {
            if (isAuth) {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('settingsPage').style.display = 'block';
                const user = getUserData();
                if (user) document.getElementById('userEmail').textContent = user.email;
                
                // Fetch atual configuração
                fetchOpenAIKey();
            }
        });

        const statusBox = document.getElementById('openaiStatusMsg');

        async function fetchOpenAIKey() {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/admin/config/openai', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if(res.ok) {
                    const data = await res.json();
                    document.getElementById('rbApiKey').placeholder = data.key ? "Chave Salva: " + data.key : "NENHUMA CHAVE SALVA! Cole sua sk-... aqui";
                    if(data.key) document.getElementById('rbApiKey').value = ""; // não mostrar password claro
                }
            } catch (err) {
                console.error("Erro ao puxar configuração:", err);
            }
        }

        async function saveOpenAIKey() {
            const apiKey = document.getElementById('rbApiKey').value.trim();
            if(!apiKey) {
                showStatus("Por favor, digite a chave primeiro.", false);
                return;
            }

            const btn = document.getElementById('btnSaveOpenAI');
            btn.disabled = true;
            btn.innerHTML = "Salvando...";

            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/admin/config/openai', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ apiKey })
                });

                if(res.ok) {
                    showStatus("✅ Chave salva e aplicada no Sistema com sucesso!", true);
                    document.getElementById('rbApiKey').value = "";
                    fetchOpenAIKey(); // Atualiza placeholder com mascara
                } else {
                    const data = await res.json();
                    showStatus("❌ Erro: " + (data.error || "Desconhecido"), false);
                }
            } catch (err) {
                showStatus("❌ Falha de Rede.", false);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "💾 Salvar Chave OpenAI";
            }
        }

        function showStatus(msg, isSuccess) {
            statusBox.style.display = 'block';
            statusBox.style.backgroundColor = isSuccess ? '#e6f7e6' : '#ffe6e6';
            statusBox.style.color = isSuccess ? '#28a745' : '#dc3545';
            statusBox.textContent = msg;
            setTimeout(() => { statusBox.style.display = 'none'; }, 5000);
        }
    </script>
</body>

</html>
