<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Kreativ</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .settings-page {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .config-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
        }

        .config-card h2 {
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--brand-color);
        }

        .btn-save {
            background: var(--brand-color);
            color: var(--brand-text);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        .status-msg {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .status-success {
            background: #e6f7e6;
            color: #22a722;
        }

        .status-error {
            background: #ffe6e6;
            color: #d32f2f;
        }

        .dashboard-header {
            background: var(--card-bg);
            padding: 20px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .back-btn:hover {
            color: var(--brand-color);
        }

        .helper-text {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .helper-link {
            color: var(--brand-color);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div id="loadingScreen" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        Carregando...</div>

    <div id="settingsPage" style="display: none; background: transparent; min-height: 100vh;">
        <header class="page-header-unified">
            <div class="header-left">
                <a href="/dashboard.html" class="back-btn">← Voltar</a>
                <div class="header-title">
                    <img src="/images/logo-wordmark.png" alt="Kreativ" class="header-logo">
                    <span class="header-separator"></span>
                    <h1>Configurações</h1>
                </div>
            </div>
            <div class="user-menu">
                <span class="user-email" id="userEmail"></span>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </header>

        <main class="settings-page">

            <!-- RB Podcast Config -->
            <div class="config-card">
                <h2>🎙️ RB Podcast</h2>
                <p class="helper-text" style="margin-bottom: 20px;">
                    Configurações para a automação do RB Podcast.
                </p>
                <div class="form-group">
                    <label>API Key de Teste</label>
                    <input type="text" id="rbApiKey" class="form-control" placeholder="Aguardando definição...">
                </div>
                <button class="btn-save" onclick="alert('Configuração em breve')">Salvar RB Podcast</button>
            </div>

        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        checkAuth(true).then(isAuth => {
            if (isAuth) {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('settingsPage').style.display = 'block';
                const user = getUserData();
                if (user) document.getElementById('userEmail').textContent = user.email;
                loadConfigs();
            }
        });

        async function loadConfigs() {
            try {
                // Load INPI
                const inpi = await apiRequest('/api/admin/config/inpi');
                if (inpi.username) document.getElementById('inpiUser').value = inpi.username;
                if (inpi.password) document.getElementById('inpiPass').value = inpi.password;

                // Load Google
                const google = await apiRequest('/api/admin/config/google');
                if (google.apiKey) document.getElementById('googleApiKey').value = google.apiKey;
                if (google.searchEngineId) document.getElementById('googleCx').value = google.searchEngineId;

                // Load YouTube Automation
                const youtube = await apiRequest('/api/admin/config/youtube');
                if (youtube.geminiApiKey) document.getElementById('geminiApiKey').value = youtube.geminiApiKey;

                // Prettify JSON if it exists, otherwise auto-fill suggestion
                const secretsEl = document.getElementById('youtubeSecrets');
                if (youtube.youtubeClientSecrets) {
                    try {
                        const parsed = JSON.parse(youtube.youtubeClientSecrets);
                        secretsEl.value = JSON.stringify(parsed, null, 2);
                    } catch (e) {
                        secretsEl.value = youtube.youtubeClientSecrets;
                    }
                } else {
                    // Automagically suggest default on first access if empty
                    autoFillSecrets(true);
                }

            } catch (e) {
                console.error('Erro ao carregar configs', e);
            }
        }

        function autoFillSecrets(isFirstLoad = false) {
            // Placeholder for user to fill in their own secrets
            const defaultSecrets = { 
                "installed": { 
                    "client_id": "YOUR_CLIENT_ID.apps.googleusercontent.com", 
                    "project_id": "YOUR_PROJECT_ID", 
                    "auth_uri": "https://accounts.google.com/o/oauth2/auth", 
                    "token_uri": "https://oauth2.googleapis.com/token", 
                    "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs", 
                    "client_secret": "YOUR_CLIENT_SECRET", 
                    "redirect_uris": ["http://localhost"] 
                } 
            };
            const secretsEl = document.getElementById('youtubeSecrets');

            if (isFirstLoad) {
                console.log('✨ Sugerindo configuração padrão de YouTube Secrets...');
            }

            secretsEl.value = JSON.stringify(defaultSecrets, null, 2);

            if (!isFirstLoad) {
                secretsEl.style.borderColor = '#28a745';
                setTimeout(() => secretsEl.style.borderColor = '', 2000);
            }
        }

        async function saveInpi() {
            const username = document.getElementById('inpiUser').value;
            const password = document.getElementById('inpiPass').value;
            const msg = document.getElementById('inpiMsg');

            try {
                await apiRequest('/api/admin/config/inpi', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });
                showMsg(msg, 'Salvo com sucesso!', 'success');
            } catch (e) {
                showMsg(msg, 'Erro: ' + e.message, 'error');
            }
        }

        async function saveGoogle() {
            const apiKey = document.getElementById('googleApiKey').value;
            const searchEngineId = document.getElementById('googleCx').value;
            const msg = document.getElementById('googleMsg');

            try {
                await apiRequest('/api/admin/config/google', {
                    method: 'POST',
                    body: JSON.stringify({ apiKey, searchEngineId })
                });
                showMsg(msg, 'Salvo com sucesso!', 'success');
            } catch (e) {
                showMsg(msg, 'Erro: ' + e.message, 'error');
            }
        }

        async function saveYoutube() {
            const geminiApiKey = document.getElementById('geminiApiKey').value.trim();
            let youtubeClientSecrets = document.getElementById('youtubeSecrets').value.trim();
            const msg = document.getElementById('youtubeMsg');

            // Basic validation
            if (youtubeClientSecrets) {
                try {
                    // Minify JSON before saving
                    youtubeClientSecrets = JSON.stringify(JSON.parse(youtubeClientSecrets));
                } catch (e) {
                    showMsg(msg, 'Erro: JSON do Youtube Shorts inválido', 'error');
                    return;
                }
            }

            try {
                await apiRequest('/api/admin/config/youtube', {
                    method: 'POST',
                    body: JSON.stringify({ geminiApiKey, youtubeClientSecrets })
                });
                showMsg(msg, 'Salvo com sucesso! Reinicie o app para aplicar.', 'success');
            } catch (e) {
                showMsg(msg, 'Erro: ' + e.message, 'error');
            }
        }

        function showMsg(el, text, type) {
            el.textContent = text;
            el.className = 'status-msg ' + (type === 'success' ? 'status-success' : 'status-error');
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
    </script>
</body>

</html>
