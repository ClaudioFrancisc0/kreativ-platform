<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários - StudioMe</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        /* Esconder conteúdo até verificar auth */
        .admin-page {
            display: none;
        }

        .loading-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f8f9fa;
        }

        .loading-screen .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: var(--brand-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Layout */
        .admin-page {
            min-height: 100vh;
            background: #f8f9fa;
        }

        .admin-header {
            background: white;
            padding: 20px 32px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: #f0f0f0;
            color: var(--brand-color);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #333 0%, #666 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-email {
            color: #666;
            font-size: 14px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #ddd;
            color: #666;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        /* Conteúdo */
        .admin-content {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .admin-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .admin-card h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0 0 8px;
        }

        .admin-card .subtitle {
            color: #666;
            font-size: 14px;
            margin: 0 0 20px;
        }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: border-color 0.2s ease;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--brand-color);
        }

        .btn-primary {
            background: var(--brand-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-primary:hover {
            background: #FF0000;
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 14px 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            font-weight: 600;
            color: #666;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            color: #1a1a1a;
            font-size: 14px;
        }

        .badge-admin {
            background: #f0f0f0;
            color: #666;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-success {
            background: #e6f7e6;
            color: #22a722;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-danger {
            background: #ffe6e6;
            color: #d32f2f;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary {
            background: #f0f0f0;
            border: none;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ffe6e6;
            border: none;
            color: #d32f2f;
        }

        .btn-danger:hover {
            background: #ffd0d0;
        }

        /* Alert */
        .alert {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #e6f7e6;
            color: #22a722;
        }

        .alert-error {
            background: #ffe6e6;
            color: #d32f2f;
        }
    </style>
</head>

<body>
    <!-- Loading screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
    </div>

    <!-- Admin Page -->
    <div class="admin-page" id="adminPage">
        <header class="admin-header">
            <div class="header-left">
                <a href="/dashboard.html" class="back-btn">
                    ← Voltar
                </a>
                <div class="header-title">
                    <div class="header-icon">👥</div>
                    <h1>Gerenciar Usuários</h1>
                </div>
            </div>
            <div class="user-menu">
                <span class="user-email" id="userEmail"></span>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </header>

        <main class="admin-content">
            <div id="alertContainer"></div>

            <!-- Form de Criação -->
            <div class="admin-card">
                <h2>Criar Novo Usuário</h2>
                <p class="subtitle">O usuário criará sua própria senha no primeiro acesso.</p>
                <form id="createUserForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="newEmail">Email</label>
                            <input type="email" id="newEmail" required placeholder="usuario@email.com">
                        </div>
                        <div class="form-group">
                            <label for="newRole">Função</label>
                            <select id="newRole" required>
                                <option value="user">Usuário</option>
                                <option value="admin">Administrador</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="createBtn">
                        ➕ Criar Usuário
                    </button>
                </form>
            </div>

            <!-- Lista de Usuários -->
            <div class="admin-card">
                <h2>Usuários Cadastrados</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Função</th>
                                <th>Status</th>
                                <th>Agentes</th>
                                <th>Criado em</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="6" style="text-align: center; color: #999;">
                                    Carregando usuários...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // Verificar autenticação (requer admin)
        checkAuth(true).then(isAuth => {
            if (isAuth) {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('adminPage').style.display = 'block';
                loadUserInfo();
                loadUsers();
            }
        });

        function loadUserInfo() {
            const user = getUserData();
            if (user) {
                document.getElementById('userEmail').textContent = user.email;
            }
        }

        function showAlert(message, type = 'error') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;

            const container = document.getElementById('alertContainer');
            container.innerHTML = '';
            container.appendChild(alertDiv);

            setTimeout(() => { alertDiv.remove(); }, 5000);
        }

        async function loadUsers() {
            try {
                const data = await apiRequest('/api/users');
                renderUsers(data.users);
            } catch (error) {
                console.error('Erro ao carregar usuários:', error);
                showAlert('Erro ao carregar usuários', 'error');
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            const currentUser = getUserData();

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">Nenhum usuário cadastrado</td></tr>';
                return;
            }

            tbody.innerHTML = users.map(user => {
                const isCurrentUser = user.id === currentUser.id;
                const createdDate = new Date(user.created_at).toLocaleDateString('pt-BR');

                return `
                    <tr>
                        <td>${user.email}</td>
                        <td>
                            ${user.role === 'admin'
                        ? '<span class="badge-admin">Admin</span>'
                        : '<span style="color: #999;">Usuário</span>'}
                        </td>
                        <td>
                            ${user.is_active
                        ? '<span class="badge-success">Ativo</span>'
                        : '<span class="badge-danger">Inativo</span>'}
                        </td>
                        <td>
                            <span style="font-size: 12px; color: #666;">
                                ${(user.enabled_agents || ['naming']).join(', ')}
                            </span>
                        </td>
                        <td>${createdDate}</td>
                        <td>
                            ${!isCurrentUser ? `
                                <div class="action-btns">
                                    <button class="btn-sm btn-secondary" onclick="toggleRole(${user.id}, '${user.role}')">
                                        ${user.role === 'admin' ? '👤 Remover Admin' : '🔑 Tornar Admin'}
                                    </button>
                                    <button class="btn-sm btn-secondary" onclick="resetPassword(${user.id})">
                                        🔒 Resetar Senha
                                    </button>
                                    <button class="btn-sm ${user.is_active ? 'btn-danger' : 'btn-secondary'}" 
                                            onclick="toggleActive(${user.id}, ${!user.is_active})">
                                        ${user.is_active ? '❌ Desativar' : '✅ Ativar'}
                                    </button>
                                    <button class="btn-sm btn-secondary" onclick="manageAgents(${user.id}, ${JSON.stringify(user.enabled_agents || ['naming']).replace(/"/g, '&quot;')})">
                                        🎯 Agentes
                                    </button>
                                </div>
                            ` : '<em style="color: #999;">Você</em>'}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('newEmail').value.trim();
            const role = document.getElementById('newRole').value;
            const createBtn = document.getElementById('createBtn');
            createBtn.disabled = true;
            createBtn.textContent = 'Criando...';

            try {
                await apiRequest('/api/users', {
                    method: 'POST',
                    body: JSON.stringify({ email, role })
                });
                showAlert('Usuário criado! Ele deverá criar sua senha no primeiro login.', 'success');
                document.getElementById('createUserForm').reset();
                loadUsers();
            } catch (error) {
                showAlert(error.message || 'Erro ao criar usuário', 'error');
            } finally {
                createBtn.disabled = false;
                createBtn.textContent = '➕ Criar Usuário';
            }
        });

        async function toggleRole(userId, currentRole) {
            const newRole = currentRole === 'admin' ? 'user' : 'admin';
            const confirmMsg = newRole === 'admin'
                ? 'Deseja tornar este usuário um administrador?'
                : 'Deseja remover privilégios de administrador deste usuário?';
            if (!confirm(confirmMsg)) return;

            try {
                await apiRequest(`/api/users/${userId}/role`, {
                    method: 'PATCH',
                    body: JSON.stringify({ role: newRole })
                });
                showAlert('Função atualizada com sucesso!', 'success');
                loadUsers();
            } catch (error) {
                showAlert(error.message || 'Erro ao atualizar função', 'error');
            }
        }

        async function resetPassword(userId) {
            if (!confirm('O usuário será forçado a criar uma nova senha no próximo login. Confirmar?')) return;
            try {
                await apiRequest(`/api/users/${userId}/reset-password`, { method: 'PATCH' });
                showAlert('Reset de senha agendado!', 'success');
                loadUsers();
            } catch (error) {
                showAlert(error.message || 'Erro ao resetar senha', 'error');
            }
        }

        async function toggleActive(userId, isActive) {
            const confirmMsg = isActive
                ? 'Deseja reativar este usuário?'
                : 'Deseja desativar este usuário?';
            if (!confirm(confirmMsg)) return;

            try {
                await apiRequest(`/api/users/${userId}/toggle-active`, {
                    method: 'PATCH',
                    body: JSON.stringify({ isActive })
                });
                showAlert(`Usuário ${isActive ? 'ativado' : 'desativado'} com sucesso!`, 'success');
                loadUsers();
            } catch (error) {
                showAlert(error.message || 'Erro ao alterar status', 'error');
            }
        }

        async function manageAgents(userId, currentAgents) {
            const availableAgents = {
                naming: 'Verificador de Nomes',
                youtube: 'Youtube Shorts',
                trade_facil: 'Trade Fácil / Delta Stats'
            };

            const agentMsg = Object.keys(availableAgents)
                .map(id => `${currentAgents.includes(id) ? '☑' : '☐'} ${availableAgents[id]} (${id})`)
                .join('\n');

            const input = prompt(
                `Agentes habilitados:\n\n${agentMsg}\n\nDigite os IDs dos agentes separados por vírgula.\nExemplo: naming,youtube`,
                currentAgents.join(',')
            );

            if (input === null) return;

            const selectedAgents = input.split(',').map(a => a.trim()).filter(a => a);

            const invalid = selectedAgents.filter(a => !Object.keys(availableAgents).includes(a));
            if (invalid.length > 0) {
                alert(`Agentes inválidos: ${invalid.join(',')}`);
                return;
            }

            try {
                await apiRequest(`/api/users/${userId}/agents`, {
                    method: 'PATCH',
                    body: JSON.stringify({ enabled_agents: selectedAgents })
                });
                showAlert('Agentes atualizados com sucesso!', 'success');
                loadUsers();
            } catch (error) {
                showAlert(error.message || 'Erro ao atualizar agentes', 'error');
            }
        }
    </script>
</body>

</html>
