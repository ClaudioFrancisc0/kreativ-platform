<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários - StudioMe</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        /* Esconder conteúdo até verificar auth */
        .admin-page {
            display: none;
        }

        .loading-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-primary);
        }

        .loading-screen .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: var(--brand-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Layout */
        .admin-page {
            min-height: 100vh;
            background: transparent;
        }

        .admin-header {
            background: var(--card-bg);
            padding: 20px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: #f0f0f0;
            color: var(--brand-color);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #333 0%, #666 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-email {
            color: #666;
            font-size: 14px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        /* Conteúdo */
        .admin-content {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .admin-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
        }

        .admin-card h2 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 8px;
        }

        .admin-card .subtitle {
            color: #666;
            font-size: 14px;
            margin: 0 0 20px;
        }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            transition: border-color 0.2s ease;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--brand-color);
        }

        .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Alert */
        .alert {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* Modal for Agents */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
        }

        .modal-card h3 {
            margin: 0 0 24px;
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 600;
        }

        .agents-checkbox-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .agent-checkbox-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
            font-size: 15px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .agent-checkbox-item:hover {
            background: var(--bg-secondary);
        }

        .agent-checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--brand-color);
            cursor: pointer;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .modal-actions .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-cancel:hover {
            background: var(--bg-secondary);
        }

        .btn-save {
            background: var(--brand-color);
            border: none;
            color: white;
        }

        .btn-save:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <!-- Loading screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
    </div>

    <!-- Admin Page -->
    <div class="admin-page" id="adminPage">
        <header class="page-header-unified">
            <div class="header-left">
                <div class="header-title">
                    <img src="/images/logo-wordmark.png" alt="Kreativ" class="header-logo">
                    <span class="header-separator"></span>
                    <a href="/dashboard.html" class="back-btn" style="margin-right: 8px;">← Voltar</a>
                    <h1 style="font-size: 20px;">👥 Gerenciar Usuários</h1>
                </div>
            </div>
            <div class="user-menu">
                <span class="user-email" id="userEmail"></span>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </header>

        <main class="admin-content">
            <div id="alertContainer"></div>

            <!-- Form de Criação -->
            <div class="admin-card">
                <h2>Criar Novo Usuário</h2>
                <p class="subtitle">O usuário criará sua própria senha no primeiro acesso.</p>
                <form id="createUserForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="newEmail">Email</label>
                            <input type="email" id="newEmail" required placeholder="usuario@email.com">
                        </div>
                        <div class="form-group">
                            <label for="newRole">Função</label>
                            <select id="newRole" required>
                                <option value="user">Usuário</option>
                                <option value="admin">Administrador</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="createBtn">➕ Criar Usuário</button>
                </form>
            </div>

            <!-- Lista de Usuários -->
            <div class="admin-card">
                <h2>Usuários Cadastrados</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Função</th>
                                <th>Status</th>
                                <th>Agentes</th>
                                <th>Criado em</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="6" style="text-align: center; color: #999;">
                                    Carregando usuários...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Agents -->
    <div id="agentsModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h3>Gerenciar Agentes</h3>
            <div id="agentsCheckboxContainer" class="agents-checkbox-list"></div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeAgentsModal()">Cancelar</button>
                <button class="btn btn-save" id="saveAgentsBtn">Salvar</button>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // Verificar autenticação (requer admin)
        checkAuth(true).then(isAuth => {
            if (isAuth) {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('adminPage').style.display = 'block';
                loadUserInfo();
                loadUsers();
            }
        });

        function loadUserInfo() {
            const user = getUserData();
            if (user) {
                document.getElementById('userEmail').textContent = user.email;
            }
        }

        function showAlert(message, type = 'error') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;

            const container = document.getElementById('alertContainer');
            container.innerHTML = '';
            container.appendChild(alertDiv);

            setTimeout(() => { alertDiv.remove(); }, 5000);
        }

        async function loadUsers() {
            try {
                const data = await apiRequest('/api/users');
                renderUsers(data.users);
            } catch (error) {
                console.error('Erro ao carregar usuários:', error);
                showAlert('Erro ao carregar usuários', 'error');
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            const currentUser = getUserData();

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">Nenhum usuário cadastrado</td></tr>';
                return;
            }

            tbody.innerHTML = users.map(user => {
                const isCurrentUser = user.id === currentUser.id;
                const createdDate = new Date(user.created_at).toLocaleDateString('pt-BR');

                return `
                    <tr>
                        <td>${user.email}</td>
                        <td>
                            ${user.role === 'dev'
                                ? '<span class="badge-admin" style="background:#dc3545;">Dev</span>'
                                : user.role === 'admin'
                                    ? '<span class="badge-admin">Admin</span>'
                                    : '<span style="color: #999;">Usuário</span>'}
                        </td>
                        <td>
                            ${user.is_active
                        ? '<span class="badge-success">Ativo</span>'
                        : '<span class="badge-danger">Inativo</span>'}
                        </td>
                        <td>
                            <span style="font-size: 12px; color: #666;">
                                ${(user.enabled_agents || ['rb_podcast']).join(', ')}
                            </span>
                        </td>
                        <td>${createdDate}</td>
                        <td>
                            ${user.role === 'dev' || user.email === 'claudio.meneghetti@studiome.com.br' ? '<em style="color: #666; font-size:12px;">🔒 Protegido</em>' : !isCurrentUser ? `
                                <div class="action-btns">
                                    <button class="btn btn-sm btn-secondary" onclick="toggleRole(${user.id}, '${user.role}')">
                                        ${user.role === 'admin' ? '👤 Remover Admin' : '🔑 Tornar Admin'}
                                    </button>
                                    <button class="btn btn-sm btn-secondary" onclick="resetPassword(${user.id})">
                                        🔒 Resetar Senha
                                    </button>
                                    <button class="btn btn-sm ${user.is_active ? 'btn-danger' : 'btn-secondary'}" 
                                            onclick="toggleActive(${user.id}, ${!user.is_active})">
                                        ${user.is_active ? '❌ Desativar' : '✅ Ativar'}
                                    </button>
                                    <button class="btn btn-sm btn-secondary" onclick="manageAgents(${user.id}, ${JSON.stringify(user.enabled_agents || ['rb_podcast']).replace(/"/g, '&quot;')})">
                                        🎯 Agentes
                                    </button>
                                </div>
                            ` : '<em style="color: #999;">Você</em>'}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('newEmail').value.trim();
            const role = document.getElementById('newRole').value;
            const createBtn = document.getElementById('createBtn');
            createBtn.disabled = true;
            createBtn.textContent = 'Criando...';

            try {
                await apiRequest('/api/users', {
                    method: 'POST',
                    body: JSON.stringify({ email, role })
                });
                showAlert('Usuário criado! Ele deverá criar sua senha no primeiro login.', 'success');
                document.getElementById('createUserForm').reset();
                loadUsers();
            } catch (error) {
                showAlert(error.message || 'Erro ao criar usuário', 'error');
            } finally {
                createBtn.disabled = false;
                createBtn.textContent = '➕ Criar Usuário';
            }
        });

        async function toggleRole(userId, currentRole) {
            const newRole = currentRole === 'admin' ? 'user' : 'admin';
            const confirmMsg = newRole === 'admin'
                ? 'Deseja tornar este usuário um administrador?'
                : 'Deseja remover privilégios de administrador deste usuário?';
            if (!confirm(confirmMsg)) return;

            try {
                await apiRequest(`/api/users/${userId}/role`, {
                    method: 'PATCH',
                    body: JSON.stringify({ role: newRole })
                });
                showAlert('Função atualizada com sucesso!', 'success');
                loadUsers();
            } catch (error) {
                showAlert(error.message || 'Erro ao atualizar função', 'error');
            }
        }

        async function resetPassword(userId) {
            if (!confirm('O usuário será forçado a criar uma nova senha no próximo login. Confirmar?')) return;
            try {
                await apiRequest(`/api/users/${userId}/reset-password`, { method: 'PATCH' });
                showAlert('Reset de senha agendado!', 'success');
                loadUsers();
            } catch (error) {
                showAlert(error.message || 'Erro ao resetar senha', 'error');
            }
        }

        async function toggleActive(userId, isActive) {
            const confirmMsg = isActive
                ? 'Deseja reativar este usuário?'
                : 'Deseja desativar este usuário?';
            if (!confirm(confirmMsg)) return;

            try {
                await apiRequest(`/api/users/${userId}/toggle-active`, {
                    method: 'PATCH',
                    body: JSON.stringify({ isActive })
                });
                showAlert(`Usuário ${isActive ? 'ativado' : 'desativado'} com sucesso!`, 'success');
                loadUsers();
            } catch (error) {
                showAlert(error.message || 'Erro ao alterar status', 'error');
            }
        }

        const availableAgents = {
            rb_podcast: '🎙️ RB Podcast'
        };

        let currentEditingUserId = null;

        function manageAgents(userId, currentAgents) {
            currentEditingUserId = userId;
            const container = document.getElementById('agentsCheckboxContainer');
            container.innerHTML = '';
            
            Object.keys(availableAgents).forEach(id => {
                const label = document.createElement('label');
                label.className = 'agent-checkbox-item';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = id;
                checkbox.checked = currentAgents.includes(id);
                
                const span = document.createElement('span');
                span.textContent = availableAgents[id];
                
                label.appendChild(checkbox);
                label.appendChild(span);
                container.appendChild(label);
            });
            
            document.getElementById('agentsModal').style.display = 'flex';
        }

        function closeAgentsModal() {
            document.getElementById('agentsModal').style.display = 'none';
            currentEditingUserId = null;
        }

        document.getElementById('saveAgentsBtn').addEventListener('click', async () => {
            if (!currentEditingUserId) return;
            
            const checkboxes = document.querySelectorAll('#agentsCheckboxContainer input[type="checkbox"]:checked');
            const selectedAgents = Array.from(checkboxes).map(cb => cb.value);
            
            try {
                const btn = document.getElementById('saveAgentsBtn');
                btn.disabled = true;
                btn.textContent = 'Salvando...';

                await apiRequest(`/api/users/${currentEditingUserId}/agents`, {
                    method: 'PATCH',
                    body: JSON.stringify({ enabled_agents: selectedAgents })
                });
                
                showAlert('Agentes atualizados com sucesso!', 'success');
                closeAgentsModal();
                loadUsers();
            } catch (error) {
                showAlert(error.message || 'Erro ao atualizar agentes', 'error');
            } finally {
                const btn = document.getElementById('saveAgentsBtn');
                btn.disabled = false;
                btn.textContent = 'Salvar';
            }
        });
    </script>
</body>

</html>
