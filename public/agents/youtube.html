<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube Shorts - StudioMe</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        /* Loading screen */
        .app-container {
            display: none;
        }

        .loading-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f8f9fa;
        }

        .loading-screen .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: var(--brand-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Layout */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Stop page from scrolling behind the app */
        }

        .app-container {
            height: 100vh;
            width: 100vw;
            background: #f8f9fa;
            position: relative;
        }

        .app-header {
            background: white;
            padding: 20px 32px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            /* Keep Above Iframe */
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: #f0f0f0;
            color: var(--brand-color);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #333 0%, #666 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-email {
            color: #666;
            font-size: 14px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #ddd;
            color: #666;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        /* IFrame Guaranteed Sizing Approach */
        .iframe-wrapper {
            position: absolute;
            top: 80px;
            /* Offset to clear the app-header */
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: calc(100vh - 80px);
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>

<body>
    <!-- Loading screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
    </div>

    <!-- App Container -->
    <div class="app-container" id="appContainer">
        <header class="app-header">
            <div class="header-left">
                <div class="header-title" style="display:flex; align-items:center;">
                    <img src="/images/logo-wordmark.png" alt="Kreativ" class="header-logo" style="height:32px; filter:var(--logo-filter, none); mix-blend-mode:var(--logo-blend, normal);">
                    <span class="header-separator" style="width:2px; height:32px; background:var(--border-color, #e0e0e0); margin:0 12px;"></span>
                    <a href="/agents.html" class="back-btn" style="margin-right: 8px;">← Voltar</a>
                    <h1 style="font-size: 20px;">🎬 Youtube Shorts</h1>
                </div>
            </div>
            <div class="user-menu">
                <span class="user-email" id="userEmail"></span>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </header>

        <main class="iframe-wrapper">
            <iframe id="appFrame" src="" allow="clipboard-read; clipboard-write; microphone;"></iframe>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // Auth check
        checkAuth().then(isAuth => {
            if (isAuth) {
                loadAppConfig();
            }
        });

        async function loadAppConfig() {
            try {
                // Fetch config to get the correct URL (dev vs prod)
                const response = await fetch('/api/config', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });

                if (!response.ok) throw new Error('Falha ao carregar configuração');

                const config = await response.json();
                const appUrl = config.youtubeAppUrl || '/youtube-app'; // Use proxy path

                // Set IFrame src
                document.getElementById('appFrame').src = appUrl;

                // Show UI
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';

                loadUserInfo();

            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao carregar a aplicação. Tente fazer login novamente.');
                window.location.href = '/login.html';
            }
        }

        function loadUserInfo() {
            const user = getUserData();
            if (user) {
                document.getElementById('userEmail').textContent = user.email;
            }
        }
    </script>
</body>

</html>
