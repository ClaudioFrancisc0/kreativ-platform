<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RB Podcast - StudioMe</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <!-- Cropper.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        .podcast-container {
            display: none;
            min-height: 100vh;
            background: var(--bg-primary, #f8f9fa);
        }

        .loading-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-primary, #f8f9fa);
        }

        .loading-screen .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: var(--brand-color, #007bff);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Content */
        .podcast-content {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .podcast-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .podcast-card h2 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 8px;
        }

        .podcast-card .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 0 0 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--brand-color);
        }

        /* File Upload Areas */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            background: var(--bg-secondary);
        }

        .upload-area:hover {
            border-color: var(--brand-color);
            background: var(--card-bg);
        }

        .upload-area.has-file {
            border-color: var(--success-color, #28a745);
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .file-name {
            display: block;
            margin-top: 8px;
            font-size: 14px;
            color: #22a722;
            word-break: break-all;
        }

        /* Cropper CSS override to make crop box circular visually */
        .img-container {
            max-width: 100%;
            max-height: 400px;
            margin-top: 16px;
            display: none;
        }
        
        .img-container img {
            max-width: 100%;
            display: block;
        }

        .cropper-view-box,
        .cropper-face {
            border-radius: 50%;
        }

        /* Button */
        .btn-start {
            background: var(--text-primary, #111);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-start:hover {
            background: var(--brand-color, #0ea5e9);
        }

        .btn-start:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
    </div>

    <div class="podcast-container" id="podcastContainer">
        <header class="page-header-unified">
            <div class="header-left">
                <div class="header-title">
                    <img src="/images/logo-wordmark.png" alt="Kreativ" class="header-logo">
                    <span class="header-separator"></span>
                    <a href="/agents.html" class="back-btn" style="margin-right: 8px;">← Voltar</a>
                    <h1 style="font-size: 20px;">🎙️ RB Podcast</h1>
                </div>
            </div>
            <div class="user-menu">
                <span class="user-email" id="userEmail"></span>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </header>

        <main class="podcast-content">
            <div class="podcast-card">
                <h2>1. Dados do Episódio</h2>
                <p class="subtitle">Preencha as informações do podcast atual</p>

                <div class="form-row" style="grid-template-columns: 120px 1fr;">
                    <div class="form-group">
                        <label>Nº do Podcast</label>
                        <input type="number" id="podNumber" placeholder="105" required>
                    </div>
                    <div></div>
                </div>

                <div class="form-row" style="grid-template-columns: 3fr 1fr;">
                    <div class="form-group">
                        <label>Nome do Speaker</label>
                        <input type="text" id="podName" placeholder="Ex: João Silva" required>
                    </div>
                    <div class="form-group">
                        <label>Gênero</label>
                        <select id="podGender" required>
                            <option value="M">Masculino</option>
                            <option value="F">Feminino</option>
                        </select>
                    </div>
                </div>

                <div class="form-row" style="grid-template-columns: 1fr;">
                    <div class="form-group">
                        <label>Assunto Principal (Pode ser uma frase longa)</label>
                        <input type="text" id="podSubject" placeholder="Ex: Inteligência Artificial e o Futuro do Trabalho" required>
                    </div>
                </div>
            </div>

            <div class="podcast-card">
                <h2>2. Ativos de Mídia</h2>
                <p class="subtitle">Faça o upload do áudio e da foto (recorte em círculo)</p>

                <div class="form-row">
                    <!-- Audio Upload -->
                    <div class="form-group">
                        <label>Chamada de Áudio (MP3)</label>
                        <div class="upload-area" id="audioArea" onclick="document.getElementById('audioInput').click()">
                            <div class="upload-icon">🎵</div>
                            <p style="margin:0; font-size:14px; color:#666;">Clique para selecionar .mp3</p>
                            <span class="file-name" id="audioFileName"></span>
                            <input type="file" id="audioInput" accept="audio/mp3, audio/mpeg">
                        </div>
                    </div>

                    <!-- Photo Upload -->
                    <div class="form-group">
                        <label>Foto do Speaker (JPG/PNG)</label>
                        <div class="upload-area" id="photoArea" onclick="document.getElementById('photoInput').click()">
                            <div class="upload-icon">📷</div>
                            <p style="margin:0; font-size:14px; color:#666;">Clique para selecionar imagem</p>
                            <span class="file-name" id="photoFileName"></span>
                            <input type="file" id="photoInput" accept="image/*">
                        </div>
                    </div>
                </div>

                <!-- Cropper Container -->
                <div class="form-group">
                    <div class="img-container" id="cropperContainer">
                        <p style="font-size: 13px; color: #666; margin-bottom: 8px;">Ajuste o recorte (Scroll para zoom, arraste para mover):</p>
                        <img id="imageToCrop" src="">
                    </div>
                </div>
            </div>

            <div class="podcast-card" style="background: transparent; box-shadow: none; padding: 0;">
                <button class="btn-start" id="startBtn" onclick="generatePodcastFiles()">
                    🚀 Gerar Materiais de Divulgação
                </button>
            </div>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        let cropper = null;
        let audioFile = null;

        // Auth
        checkAuth().then(isAuth => {
            if (isAuth) {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('podcastContainer').style.display = 'block';
                const user = getUserData();
                if (user) document.getElementById('userEmail').textContent = user.email;
                
                // Fetch Podcast Number from Cloud DB
                fetch('/api/agents/rb_podcast/number', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                })
                .then(res => res.json())
                .then(data => {
                    document.getElementById('podNumber').value = (data.number || 0) + 1;
                })
                .catch(err => {
                    console.error('Erro ao buscar número:', err);
                    document.getElementById('podNumber').value = 1;
                });
            }
        });

        // Audio Upload
        document.getElementById('audioInput').addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                audioFile = e.target.files[0];
                document.getElementById('audioFileName').textContent = audioFile.name;
                document.getElementById('audioArea').classList.add('has-file');
            }
        });

        // Photo Upload & Cropper Initialization
        document.getElementById('photoInput').addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const file = e.target.files[0];
                document.getElementById('photoFileName').textContent = file.name;
                document.getElementById('photoArea').classList.add('has-file');

                const reader = new FileReader();
                reader.onload = function(evt) {
                    const imageElement = document.getElementById('imageToCrop');
                    imageElement.src = evt.target.result;
                    document.getElementById('cropperContainer').style.display = 'block';

                    // Destroy old cropper if exists
                    if (cropper) cropper.destroy();

                    // Init new circular cropper
                    cropper = new Cropper(imageElement, {
                        aspectRatio: 1, // 1:1 Square (CSS visually makes it a circle)
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 0.8,
                        restore: false,
                        guides: false,
                        center: false,
                        highlight: false,
                        cropBoxMovable: false,
                        cropBoxResizable: false,
                        toggleDragModeOnDblclick: false,
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        // Generate Action
        async function generatePodcastFiles() {
            const number = document.getElementById('podNumber').value;
            const gender = document.getElementById('podGender').value;
            const name = document.getElementById('podName').value;
            const subject = document.getElementById('podSubject').value;

            if (!number || !name || !subject || !audioFile || !cropper) {
                alert('Por favor, preencha todos os campos e selecione os dois arquivos (áudio e foto recortada).');
                return;
            }

            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner" style="width:20px; height:20px; border-width:2px;"></div> Processando...';

            try {
                // Obter a imagem cortada como Blob (já redonda/quadrada)
                const croppedCanvas = cropper.getCroppedCanvas({
                    width: 800,
                    height: 800,
                    imageSmoothingEnabled: true,
                    imageSmoothingQuality: 'high',
                });
                
                croppedCanvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('number', number);
                    formData.append('gender', gender);
                    formData.append('name', name);
                    formData.append('subject', subject);
                    formData.append('audioFile', audioFile);
                    formData.append('photoFile', blob, 'speaker_cropped.png');

                    // NOTE: Endpoint ainda a ser integrado. 
                    // Simulando envio para validação do frontend.
                    console.log('Dados do formulário prontos para envio:', {
                        number, gender, name, subject, audioFile, blob
                    });
                    
                    // Save the last utilized number to Cloud DB
                    fetch('/api/agents/rb_podcast/number', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        },
                        body: JSON.stringify({ number })
                    }).catch(console.error);
                    
                    alert('Os dados e a foto recortada foram processados no frontend com sucesso! Aguardando endpoint do servidor / Layouts.');
                    
                    // TODO: Fazer fetch para '/api/agents/rb_podcast/generate' aqui.
                    
                    btn.disabled = false;
                    btn.innerHTML = '🚀 Gerar Materiais de Divulgação';
                }, 'image/png');

            } catch (error) {
                console.error(error);
                alert('Erro ao processar imagem.');
                btn.disabled = false;
                btn.innerHTML = '🚀 Gerar Materiais de Divulgação';
            }
        }
    </script>
</body>
</html>
