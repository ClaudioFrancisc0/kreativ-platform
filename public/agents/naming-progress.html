<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação em Andamento - StudioMe</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        /* Loading screen */
        .progress-container {
            display: none;
        }

        .loading-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f8f9fa;
        }

        .loading-screen .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: var(--brand-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Layout */
        .progress-container {
            min-height: 100vh;
            background: #f8f9fa;
        }

        .progress-header {
            background: white;
            padding: 20px 32px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #333 0%, #666 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0;
        }

        /* Content */
        .progress-content {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .progress-card {
            background: white;
            border-radius: 16px;
            padding: 48px 32px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .progress-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }

        .progress-card h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0 0 8px;
        }

        .progress-subtitle {
            color: #666;
            font-size: 16px;
            margin: 0 0 32px;
        }

        /* Progress bar */
        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--brand-color) 0%, #ff4d4d 100%);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 32px;
        }

        /* Current item */
        .current-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 16px 24px;
            margin-bottom: 24px;
        }

        .current-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .current-name {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        /* Status indicators */
        .status-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 32px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .status-icon {
            font-size: 18px;
        }

        .status-icon.done {
            color: #22a722;
        }

        .status-icon.active {
            color: #f57c00;
            animation: pulse 1s infinite;
        }

        .status-icon.pending {
            color: #ccc;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Time estimate */
        .time-estimate {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Cancel button */
        .btn-cancel {
            background: transparent;
            border: 1px solid #ddd;
            color: #666;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-cancel:hover {
            border-color: #d32f2f;
            color: #d32f2f;
        }

        /* Complete state */
        .complete-state {
            display: none;
        }

        .complete-state.show {
            display: block;
        }

        .btn-download {
            background: #22a722;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-bottom: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download:hover {
            background: #1e8e1e;
        }

        .btn-new {
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-new:hover {
            background: #e0e0e0;
        }

        /* Stats */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 32px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-value.green {
            color: #22a722;
        }

        .stat-value.yellow {
            color: #f57c00;
        }

        .stat-value.red {
            color: #d32f2f;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
        }
    </style>
</head>

<body>
    <!-- Loading screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
    </div>

    <!-- Progress Page -->
    <div class="progress-container" id="progressContainer">
        <header class="progress-header">
            <div class="header-left">
                <div class="header-title" style="display:flex; align-items:center;">
                    <img src="/images/logo-wordmark.png" alt="Kreativ" class="header-logo" style="height:32px; filter:var(--logo-filter, none); mix-blend-mode:var(--logo-blend, normal);">
                    <span class="header-separator" style="width:2px; height:32px; background:var(--border-color, #e0e0e0); margin:0 12px;"></span>
                    <a href="/agents.html" class="back-btn" style="margin-right: 8px; text-decoration:none; color:#666; font-size:14px;">← Voltar</a>
                    <h1 style="font-size: 20px;">🔍 Verificador de Naming</h1>
                </div>
            </div>
        </header>

        <main class="progress-content">
            <div class="progress-card">
                <!-- Progress State -->
                <div id="progressState">
                    <div class="progress-icon">⏳</div>
                    <h2>Verificação em Andamento</h2>
                    <p class="progress-subtitle" id="progressSubtitle">Processando nomes...</p>

                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <p class="progress-text" id="progressText">0 de 0 nomes verificados</p>

                    <div class="current-item">
                        <div class="current-label">Verificando agora</div>
                        <div class="current-name" id="currentName">-</div>
                    </div>

                    <div class="status-steps">
                        <div class="status-item">
                            <span class="status-icon pending" id="statusINPI">○</span>
                            <span>INPI</span>
                        </div>
                        <div class="status-item">
                            <span class="status-icon pending" id="statusGoogle">○</span>
                            <span>Google</span>
                        </div>
                        <div class="status-item">
                            <span class="status-icon pending" id="statusInstagram">○</span>
                            <span>Instagram</span>
                        </div>
                    </div>

                    <p class="time-estimate" id="timeEstimate">Tempo estimado: calculando...</p>

                    <button class="btn-cancel" onclick="cancelVerification()">Cancelar</button>
                </div>

                <!-- Complete State -->
                <div class="complete-state" id="completeState">
                    <div class="progress-icon">✅</div>
                    <h2>Verificação Concluída!</h2>
                    <p class="progress-subtitle">Todos os nomes foram verificados</p>

                    <div class="stats-row">
                        <div class="stat-item">
                            <div class="stat-value green" id="statGreen">0</div>
                            <div class="stat-label">Liberados</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value yellow" id="statYellow">0</div>
                            <div class="stat-label">Avaliar</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value red" id="statRed">0</div>
                            <div class="stat-label">Bloqueados</div>
                        </div>
                    </div>

                    <button class="btn-download" onclick="downloadResults()">
                        📥 Download da Planilha
                    </button>
                    <br>
                    <button class="btn-new" onclick="newVerification()">Nova Verificação</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        let config = null;
        let verificationId = null;
        let cancelled = false;

        // Auth check
        checkAuth().then(isAuth => {
            if (isAuth) {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('progressContainer').style.display = 'block';

                // Get config from localStorage
                const savedConfig = localStorage.getItem('naming_config');
                if (!savedConfig) {
                    window.location.href = '/agents/naming.html';
                    return;
                }

                config = JSON.parse(savedConfig);
                startProcessing();
            }
        });

        async function startProcessing() {
            verificationId = localStorage.getItem('naming_verification_id');
            if (!verificationId) {
                alert('ID da verificação não encontrado');
                window.location.href = '/agents/naming.html';
                return;
            }

            const totalNames = config.names.length;
            document.getElementById('progressSubtitle').textContent =
                `Processando ${totalNames} nomes...`;

            pollStatus();
        }

        async function pollStatus() {
            if (cancelled) return;

            try {
                const response = await apiRequest(`/api/naming/status/${verificationId}`);

                if (response.status === 'completed') {
                    showComplete(response.id);
                    return;
                }

                if (response.status === 'error') {
                    alert('Erro na verificação: ' + (response.error || 'Erro desconhecido'));
                    return;
                }

                if (response.status === 'cancelled') {
                    window.location.href = '/agents/naming.html';
                    return;
                }

                // Update UI
                const { current, total, currentName, currentStep } = response.progress;
                const progress = (current / total) * 100;

                document.getElementById('progressBar').style.width = `${progress}%`;
                document.getElementById('progressText').textContent =
                    `${current} de ${total} nomes verificados`;
                document.getElementById('currentName').textContent = currentName || '-';

                updateStatus(currentStep);

                // Estimate time (simple avg 5s per name)
                const remaining = total - current;
                const seconds = remaining * 5;
                document.getElementById('timeEstimate').textContent =
                    `Tempo estimado: ${Math.ceil(seconds / 60)} min`;

                // Poll again
                setTimeout(pollStatus, 2000);

            } catch (error) {
                console.error('Erro ao buscar status:', error);
                // Retry
                setTimeout(pollStatus, 5000);
            }
        }

        function updateStatus(step) {
            const ig = document.getElementById('statusInstagram');
            const go = document.getElementById('statusGoogle');
            const inpi = document.getElementById('statusINPI');

            // Icons: 
            // Pending: ○ (White circle / Open circle)
            // Active: ● (Orange pulsing)
            // Done: ● (Green static)

            if (step === 'inpi') {
                inpi.className = 'status-icon active'; inpi.textContent = '●';
                go.className = 'status-icon pending'; go.textContent = '○';
                ig.className = 'status-icon pending'; ig.textContent = '○';
            } else if (step === 'google') {
                inpi.className = 'status-icon done'; inpi.textContent = '●';
                go.className = 'status-icon active'; go.textContent = '●';
                ig.className = 'status-icon pending'; ig.textContent = '○';
            } else if (step === 'instagram') {
                inpi.className = 'status-icon done'; inpi.textContent = '●';
                go.className = 'status-icon done'; go.textContent = '●';
                ig.className = 'status-icon active'; ig.textContent = '●';
            } else if (step === 'done') {
                inpi.className = 'status-icon done'; inpi.textContent = '●';
                go.className = 'status-icon done'; go.textContent = '●';
                ig.className = 'status-icon done'; ig.textContent = '●';
            }
        }

        async function showComplete(id) {
            document.getElementById('progressState').style.display = 'none';
            document.getElementById('completeState').classList.add('show');

            try {
                const data = await apiRequest(`/api/naming/results/${id}`);

                document.getElementById('statGreen').textContent = data.stats.green;
                document.getElementById('statYellow').textContent = data.stats.yellow;
                document.getElementById('statRed').textContent = data.stats.red;

            } catch (error) {
                console.error('Erro ao buscar resultados:', error);
            }
        }

        async function cancelVerification() {
            if (confirm('Deseja realmente cancelar a verificação?')) {
                cancelled = true;
                try {
                    await apiRequest(`/api/naming/cancel/${verificationId}`, 'POST');
                    window.location.href = '/agents/naming.html';
                } catch (error) {
                    console.error('Erro ao cancelar:', error);
                    alert('Erro ao cancelar verificação');
                }
            }
        }

        async function downloadResults() {
            const btn = document.querySelector('.btn-download');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Baixando...';

            try {
                const token = getToken();
                const response = await fetch(`/api/naming/download/${verificationId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Erro ao baixar arquivo');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `naming_results_${verificationId}.xlsx`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();

            } catch (error) {
                console.error('Erro no download:', error);
                alert('Erro ao baixar planilha. Tente novamente.');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        function newVerification() {
            localStorage.removeItem('naming_config');
            window.location.href = '/agents/naming.html';
        }
    </script>
</body>

</html>
