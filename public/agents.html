<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentes - Kreativ</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        /* Esconder conteúdo até verificar auth */
        .agents-container {
            display: none;
        }

        .loading-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-primary);
        }

        .loading-screen .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--brand-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Layout do menu de agentes */
        .agents-container {
            min-height: 100vh;
            background: transparent;
        }

        .agents-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .agents-header .logo {
            width: 120px;
            height: auto;
            background: transparent;
            color: var(--brand-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            filter: var(--logo-filter);
        }

        .agents-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 8px;
        }

        .agents-header p {
            color: var(--text-secondary);
            font-size: 16px;
            margin: 0;
        }

        .user-greeting {
            color: var(--brand-color);
            font-weight: 500;
        }

        /* Grid de agentes */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            max-width: 900px;
            margin: 0 auto;
        }

        .agent-card {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 32px;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            border: 2px solid var(--border-color);
        }

        .agent-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            border-color: var(--brand-color);
        }

        .agent-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #333 0%, #666 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .agent-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 8px;
        }

        .agent-description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }

        .agent-badge {
            display: inline-block;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            margin-top: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid var(--border-color);
        }

        /* Footer com logout */
        .agents-footer {
            text-align: center;
            margin-top: 48px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
            background: var(--bg-secondary);
        }
    </style>
</head>

<body>
    <!-- Loading screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
    </div>

    <!-- Menu de Agentes -->
    <div class="agents-container" id="agentsContainer">
        <header class="page-header-unified">
            <div class="header-left">
                <div class="header-title">
                    <img src="/images/logo-wordmark.png" alt="Kreativ" class="header-logo">
                    <span class="header-separator"></span>
                    <h1 style="font-size: 20px;">🤖 Agentes</h1>
                </div>
            </div>
            <div class="user-menu">
                <span class="user-email" id="userNameHeader"></span>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </header>

        <main class="agents-main" style="padding: 40px 20px;">
            <div style="text-align: center; margin-bottom: 40px;">
                <p style="color: var(--text-secondary); font-size: 16px; margin: 0;">Olá, <span class="user-greeting" id="userName">usuário</span>! Escolha uma automação abaixo:</p>
            </div>

            <div class="agents-grid" id="agentsGrid">
                <!-- Agents will be loaded dynamically -->
            </div>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // Agent definitions
        const AVAILABLE_AGENTS = {
            rb_podcast: {
                id: 'rb_podcast',
                name: 'RB Podcast',
                icon: '🎙️',
                description: 'Automação inteligente para fluxos de podcast e produção de conteúdo.',
                url: '/agents/rb_podcast.html',
                badge: 'Novo'
            }
        };

        // Verificar autenticação antes de mostrar conteúdo
        checkAuth().then(isAuth => {
            if (isAuth) {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('agentsContainer').style.display = 'block';
                loadUserInfo();
                loadAvailableAgents();
            }
        });

        function loadUserInfo() {
            const user = getUserData();
            if (user) {
                const emailParts = user.email.split('@');
                document.getElementById('userName').textContent = emailParts[0];
                document.getElementById('userNameHeader').textContent = user.email;
            }
        }

        async function loadAvailableAgents() {
            try {
                const user = getUserData();
                const response = await apiRequest('/api/agents/available');
                const enabledAgents = response.enabled_agents || [];

                const grid = document.getElementById('agentsGrid');
                grid.innerHTML = ''; // Clear loading message

                // Combined agents: start with hardcoded ones, then merge with enabled from API
                const agentsToShow = new Set(['rb_podcast']); // Always show RB Podcast
                enabledAgents.forEach(id => agentsToShow.add(id));

                // Render agents
                agentsToShow.forEach(agentId => {
                    const agent = AVAILABLE_AGENTS[agentId];
                    if (agent) {
                        grid.innerHTML += `
                            <a href="${agent.url}" class="agent-card">
                                <div class="agent-icon">${agent.icon}</div>
                                <h2 class="agent-title">${agent.name}</h2>
                                <p class="agent-description">${agent.description}</p>
                                <span class="agent-badge">${agent.badge}</span>
                            </a>
                        `;
                    }
                });

                // Add Dashboard card for admins
                if (user && user.role === 'admin') {
                    grid.innerHTML += `
                        <a href="/dashboard.html" class="agent-card">
                            <div class="agent-icon">⚙️</div>
                            <h2 class="agent-title">Dashboard</h2>
                            <p class="agent-description">Gerencie usuários, visualize métricas e configure a plataforma.</p>
                            <span class="agent-badge">Administração</span>
                        </a>
                    `;
                }

            } catch (error) {
                console.error('Erro ao carregar agentes:', error);
                document.getElementById('agentsGrid').innerHTML = `
                    <p style="text-align: center; color: #666;">Erro ao carregar agentes. Tente novamente.</p>
                `;
            }
        }
    </script>
</body>

</html>
