<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetar Senha - Kreativ</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="/images/logo-square.png" alt="Kreativ" class="logo">
                <h1>Resetar Senha</h1>
                <p>Seu administrador solicitou que você crie uma nova senha</p>
            </div>

            <div id="alert" class="alert alert-info show">
                Por favor, crie uma nova senha para continuar.
            </div>

            <form id="resetForm" class="auth-form">
                <div class="form-group">
                    <label for="newPassword">Nova Senha</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Mínimo 6 caracteres"
                        required minlength="6" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar Nova Senha</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                        placeholder="Confirme sua nova senha" required minlength="6" autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Atualizar Senha
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const alertDiv = document.getElementById('alert');
        const token = localStorage.getItem('token');

        function showAlert(message, type = 'error') {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type} show`;
        }

        // Verificar se está logado
        if (!token) {
            window.location.href = '/login.html';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validações
            if (newPassword !== confirmPassword) {
                showAlert('As senhas não coincidem', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showAlert('A senha deve ter no mínimo 6 caracteres', 'error');
                return;
            }

            // Loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            submitBtn.textContent = 'Atualizando...';

            try {
                const response = await fetch('/api/auth/reset-my-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Senha atualizada com sucesso! Redirecionando...', 'success');

                    // Atualizar flag no localStorage
                    const user = JSON.parse(localStorage.getItem('user'));
                    user.must_reset_password = false;
                    localStorage.setItem('user', JSON.stringify(user));

                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    showAlert(data.error || 'Erro ao atualizar senha', 'error');
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('loading');
                    submitBtn.textContent = 'Atualizar Senha';
                }
            } catch (error) {
                console.error('Erro:', error);
                showAlert('Erro ao conectar com o servidor', 'error');
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                submitBtn.textContent = 'Atualizar Senha';
            }
        });
    </script>
</body>

</html>
